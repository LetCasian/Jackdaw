<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data: file:;" />
  <title>Jackdaw Reference</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #1a1a1a;
      user-select: none;
      cursor: default;
    }

    #frame {
      width: 100vw;
      height: 100vh;
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: #1a1a1a;
      cursor: move;          /* la zoom 1, drag = muta fereastra */
    }
    #frame.zoomed { cursor: grab; }
    #frame.grabbing { cursor: grabbing; }

    #img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transform-origin: center center;
      will-change: transform;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    #close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s;
      backdrop-filter: blur(6px);
      z-index: 10;
    }
    #frame:hover #close { opacity: 1; }
    #close:hover { background: #c94a4a; }

    #zoom-badge {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: #7BA7BC;
      font-family: system-ui, sans-serif;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      opacity: 0;
      transition: opacity 0.3s;
      backdrop-filter: blur(6px);
      pointer-events: none;
      z-index: 10;
    }
    #zoom-badge.show { opacity: 1; }

    #frame::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      border: 1px solid rgba(123, 167, 188, 0);
      transition: border-color 0.2s;
      pointer-events: none;
    }
    #frame:hover::after { border-color: rgba(123, 167, 188, 0.4); }

    /* Zone de resize pe margini */
    .resize-edge { position: absolute; z-index: 8; }
    .re-r { top: 0; right: 0; width: 8px; height: 100%; cursor: ew-resize; }
    .re-b { bottom: 0; left: 0; width: 100%; height: 8px; cursor: ns-resize; }
    .re-br { bottom: 0; right: 0; width: 16px; height: 16px; cursor: nwse-resize; z-index: 9; }
  </style>
</head>
<body>
  <div id="frame">
    <img id="img" alt="reference" draggable="false" />
    <button id="close" title="Close (Esc)">&times;</button>
    <div id="zoom-badge">100%</div>
    <div class="resize-edge re-r"></div>
    <div class="resize-edge re-b"></div>
    <div class="resize-edge re-br"></div>
  </div>
  <script src="pin.js"></script>
</body>
</html>
